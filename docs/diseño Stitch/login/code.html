<button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl bg-white border border-outline-variant/30 text-on-surface font-medium hover:bg-surface-container-low transition-colors duration-200">

<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-on-surface-variant px-1" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm transition-all outline-none" id="email" placeholder="ejemplo@syntia.ai" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant" for="password">Contraseña</label>
<a class="text-primary text-[11px] font-bold hover:underline" href="#">Olvidé mi contraseña</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm transition-all outline-none" id="password" placeholder="••••••••" type="password"/>

</div>
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="text-xs text-on-surface-variant font-medium cursor-pointer select-none" for="remember">Recordar sesión</label>
</div>
<button class="w-full mt-2 py-3.5 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 transition-all duration-200" type="submit">

                    </button>

<p class="text-xs text-on-surface-variant">
                        ¿No tienes una cuenta? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Regístrate ahora</a>
</p>
