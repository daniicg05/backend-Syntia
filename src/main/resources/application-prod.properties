spring.application.name=syntia-ia

# ========================
# Perfil PRODUCCION
# ========================
# Activar con: --spring.profiles.active=prod
# O variable: SPRING_PROFILES_ACTIVE=prod

# ========================
# Servidor
# ========================
server.port=${PORT:8080}

# ========================
# Base de datos PostgreSQL
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# API REST (sin vistas)
# ========================
spring.thymeleaf.enabled=false
spring.web.resources.add-mappings=false

# ========================
# CORS (PROD)
# Ej: https://app.tudominio.com,https://admin.tudominio.com
# ========================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ========================
# JWT (PROD) - BASE64 sin fallback
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# OpenAI
# ========================
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1}
openai.max-tokens=${OPENAI_MAX_TOKENS:500}
openai.max-tokens-large=${OPENAI_MAX_TOKENS_LARGE:8000}
openai.temperature=${OPENAI_TEMPERATURE:0.1}

# ========================
# Email (Google SMTP)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# Google OAuth2
# ========================
google.client-id=${GOOGLE_CLIENT_ID}

# ========================
# Frontend URL
# ========================
app.frontend.url=${APP_FRONTEND_URL}

# ========================
# Logging (PROD)
# ========================
logging.level.org.springframework.security=WARN
logging.level.com.syntia.mvp=INFO
logging.level.org.hibernate=WARN