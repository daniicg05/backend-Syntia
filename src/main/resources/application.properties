spring.application.name=syntia-ia
spring.config.import=optional:file:.env[.properties]

# ========================
# Servidor
# ========================
server.port=8080

# ========================
# Base de datos PostgreSQL (DEV)
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/syntia_db}
spring.datasource.username=${DB_USER:syntia}
spring.datasource.password=${DB_PASSWORD:syntia}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate (DEV)
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# API REST (sin vistas)
# ========================
spring.thymeleaf.enabled=false
spring.web.resources.add-mappings=false

# ========================
# CORS (React local)
# ========================
app.cors.allowed-origins=http://localhost:3000

# ========================
# JWT (DEV) - BASE64
# ========================
jwt.secret=${JWT_SECRET:U3ludGlhSldURGV2U2VjcmV0S2V5QmFzZTY0MTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# Logging (DEV)
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.com.syntia.mvp=DEBUG

# ========================
# OpenAI
# ========================
openai.api-key=${OPENAI_API_KEY:}

# ========================
# Admin inicial
# ========================
admin.email=${ADMIN_EMAIL:admin@syntia.com}
admin.password=${ADMIN_PASSWORD:}
openai.model=${OPENAI_MODEL:gpt-4.1}
openai.max-tokens=${OPENAI_MAX_TOKENS:500}
openai.max-tokens-large=${OPENAI_MAX_TOKENS_LARGE:8000}
openai.temperature=${OPENAI_TEMPERATURE:0.1}

# ========================
# BDNS Scheduler e importación
# ========================
# Cron por defecto: día 1 de enero y julio a las 3:00 AM (cada 6 meses)
bdns.scheduler.cron=0 0 3 1 1,7 *
# Delay entre peticiones a la API BDNS durante importación masiva (ms)
bdns.import.delay-ms=300