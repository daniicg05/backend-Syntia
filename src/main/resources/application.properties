spring.application.name=syntia-ia
spring.config.import=optional:file:.env[.properties]

# ========================
# Servidor
# ========================
server.port=8080

# ========================
# Base de datos PostgreSQL (DEV)
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/syntia_db}
spring.datasource.username=${DB_USER:syntia}
spring.datasource.password=${DB_PASSWORD:syntia}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate (DEV)
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# API REST (sin vistas)
# ========================
spring.thymeleaf.enabled=false
spring.web.resources.add-mappings=false

# ========================
# CORS (React local)
# ========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ========================
# JWT (DEV) - BASE64
# ========================
jwt.secret=${JWT_SECRET:U3ludGlhSldURGV2U2VjcmV0S2V5QmFzZTY0MTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# Logging (DEV)
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.com.syntia.ai=DEBUG
# ========================
# OpenAI
# ========================
openai.api-key=${OPENAI_API_KEY:}

# ========================
# Admin inicial
# ========================
admin.email=${ADMIN_EMAIL:admin@syntia.com}
admin.password=${ADMIN_PASSWORD:}
openai.model=${OPENAI_MODEL:gpt-4.1}
openai.max-tokens=${OPENAI_MAX_TOKENS:500}
openai.max-tokens-large=${OPENAI_MAX_TOKENS_LARGE:8000}
openai.temperature=${OPENAI_TEMPERATURE:0.1}

# ========================
# Email (Gmail SMTP over SSL)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:syntialicante@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

# ========================
# Google OAuth2
# ========================
google.client-id=${GOOGLE_CLIENT_ID:}

# ========================
# Frontend URL (para enlaces en emails)
# ========================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# ========================
# BDNS Scheduler e importación
# ========================
# Cron por defecto: día 1 de enero y julio a las 3:00 AM (cada 6 meses)
bdns.scheduler.cron=0 0 3 1 1,7 *
# Delay entre peticiones a la API BDNS durante importación masiva (ms)
bdns.import.delay-ms=300
# Timeouts del cliente HTTP BDNS (ms)
bdns.client.connect-timeout-ms=10000
bdns.client.read-timeout-ms=30000
# Límite de convocatorias por sesión de importación (manual / NUEVAS)
bdns.import.limite-convocatorias=10000
# Límite para importación FULL automática (scheduler) — sin tope práctico
bdns.import.limite-full=620000
# Reintentos ante fallos de red o 5xx
bdns.client.max-reintentos=3
bdns.client.reintento-delay-ms=1500